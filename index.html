<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DATA STOLEN</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Consolas, monospace;
}

body{
    background:#000;
    color:#ff0000;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

#matrix{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:0;
    opacity:.35;
}

body::before{
    content:"";
    position:absolute;
    inset:0;
    background:radial-gradient(
        circle at center,
        rgba(255,0,0,.2),
        transparent 70%
    );
    animation:pulse 2s infinite;
    z-index:1;
}

.scanlines{
    position:fixed;
    inset:0;
    background:
    repeating-linear-gradient(
        to bottom,
        transparent 0px,
        rgba(255,255,255,.03) 1px,
        transparent 2px
    );
    pointer-events:none;
    z-index:2;
}

.container{
    text-align:center;
    z-index:10;
    padding:20px;
    max-width:900px;
}

.lock{
    font-size:130px;
    text-shadow:
        0 0 10px red,
        0 0 25px red,
        0 0 50px red;
    animation:shake .15s infinite alternate;
}

.title{
    margin-top:10px;
    font-size:48px;
    font-weight:bold;
    color:#ff0000;
    text-shadow:
        0 0 10px red,
        0 0 25px red,
        0 0 50px red;
}

.subtitle{
    margin-top:15px;
    font-size:34px;
    color:#ff4444;
    font-weight:bold;
    letter-spacing:4px;
}

.timer{
    margin-top:25px;
    font-size:48px;
    font-weight:bold;
    color:#ffffff;
    text-shadow:
        0 0 10px red,
        0 0 25px red,
        0 0 50px red;
    animation:blink 1s infinite;
}

.warning{
    margin-top:35px;
    font-size:24px;
    line-height:1.9;
    color:#ff6666;
    text-shadow:0 0 10px red;
}

.footer{
    margin-top:40px;
    color:#660000;
    font-size:13px;
}

@keyframes pulse{
    0%{opacity:.4;}
    50%{opacity:1;}
    100%{opacity:.4;}
}

@keyframes shake{
    from{transform:translateX(-2px);}
    to{transform:translateX(2px);}
}

@keyframes blink{
    0%,100%{opacity:1;}
    50%{opacity:.4;}
}
</style>
</head>
<body>

<canvas id="matrix"></canvas>

<div class="scanlines"></div>

<div class="container">

<div class="lock">🗃️</div>

<div class="title">
DATA STOLEN BY D4RKZ
</div>

<div class="subtitle">
HARD TROJAN
</div>

<div class="timer">
ALL DATA IS STOLEN BY D4 TEAM
</div>

<div class="warning">
ALL DATA IS BREACHED
<br><br>
STATUS : HARD TROJAN × LUMMA 911
<br>
ANDROID : KILLED
</div>

<div class="footer">
D4 TEAM BREACHING SECURITY SYSTEM v2.5.0
</div>

</div>

<script>
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();

const chars =
"01ABCDEFGHIJKLMNOPQRSTUVWXYZアイウエオカキクケコサシスセソ";

const fontSize = 16;
let columns = Math.floor(canvas.width / fontSize);
let drops = [];

function initDrops(){
    drops = [];
    columns = Math.floor(canvas.width / fontSize);

    for(let i=0;i<columns;i++){
        drops[i] = Math.random() * canvas.height;
    }
}
initDrops();

function draw(){

    ctx.fillStyle = "rgba(0,0,0,0.08)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "#ff0000";
    ctx.font = fontSize + "px monospace";

    for(let i=0;i<drops.length;i++){

        const text =
        chars[Math.floor(Math.random()*chars.length)];

        ctx.fillText(
            text,
            i * fontSize,
            drops[i]
        );

        if(
            drops[i] > canvas.height &&
            Math.random() > 0.975
        ){
            drops[i] = 0;
        }

        drops[i] += fontSize;
    }
}

setInterval(draw,35);

window.addEventListener("resize",()=>{
    resize();
    initDrops();
});
</script>

</body>
</html>
